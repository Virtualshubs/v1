<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Producto 3D - 3D Twins</title>

<!-- SDK -->
<script src="https://cdn.3dtwins.tech/sdk.js"></script>

<!-- LZString para compresión de URL -->
<script src="https://cdn.jsdelivr.net/npm/lz-string/libs/lz-string.min.js"></script>

<!-- jsPDF y QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background-color: #f8f8f8;
    color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .product-page {
    display: flex;
    max-width: 1000px;
    width: 90%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    background-color: #fff;
  }
  #vh-container {
    flex: 1;
    background-color: #f2f2f2;
    margin: 20px;
    border-radius: 8px;
    position: relative;
    min-width: 400px;
    min-height: 400px;
  }
  .product-info {
    flex: 1;
    padding: 30px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 15px;
    background-color: #fff;
  }
  .product-info h1 {
    font-size: 1.8em;
    margin: 0;
  }
  .product-info p {
    font-size: 1em;
    color: #555;
    margin: 0;
  }
  .colors-container {
    display: flex;
    gap: 8px;
    margin: 10px 0;
  }
  .color-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid #ccc;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .color-circle.selected {
    border: 2px solid #111;
  }
  .buy-button, .save-button {
    margin-top: 10px;
    padding: 12px;
    font-size: 1em;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 6px;
  }
  .buy-button {
    background-color: #111;
    color: #fff;
  }
  .buy-button:hover {
    background-color: #333;
  }
  .save-button {
    background-color: #fff;
    color: #111;
    border: 1px solid #111;
  }
  .save-button:hover {
    background-color: #f0f0f0;
  }
  label {
    font-weight: bold;
  }
  input[type="number"] {
    width: 60px;
    padding: 4px 8px;
    font-size: 1em;
  }
</style>
</head>
<body>

<div class="product-page">
  <div id="vh-container"></div>

  <div class="product-info">
    <h1 id="product-name">Nombre del producto</h1>
    <p id="product-author">Autor: </p>

    <div id="colors" class="colors-container"></div>

    <label for="productQuantity">Cantidad:</label>
    <input type="number" id="productQuantity" value="1" min="1">

    <button class="buy-button" id="buy-button">Comprar</button>
    <button class="save-button" id="save-button">Guardar diseño (PDF)</button>

    <p id="short-url" style="word-break: break-all; font-size: 0.9em; color: #333;"></p>
  </div>
</div>

<script>
(async function(){
  const urlParams = new URLSearchParams(window.location.search);
  let base64Scene = '';
  if(urlParams.has('scene')) base64Scene = urlParams.get('scene');
  if(!base64Scene) {
    console.error("No se ha proporcionado escena en la URL");
    return;
  }

  // Inicializar SDK
  VH.init({
    containerId: 'vh-container',
    scene: base64Scene
  });

  history.replaceState({}, '', `?scene=${base64Scene}`);

  // Extraer info del producto
  const colorsContainer = document.getElementById('colors');
  let rawUrl = '';
  let productName = '';
  let productAuthor = '';
  try {
    const decoded = atob(base64Scene);
    rawUrl = decoded;
    const params = new URLSearchParams(decoded.split('?')[1]);
    productName = params.get('name') || '';
    productAuthor = params.get('author') || 'Desconocido';

    document.getElementById('product-name').innerText = productName;
    document.getElementById('product-author').innerText = 'Autor: ' + productAuthor;

    const config = params.get('config') || '';
    if(config){
      config.split('|').forEach((item,index)=>{
        const [objName, colorHex] = item.split(':');
        if(colorHex){
          const circle = document.createElement('span');
          circle.className = 'color-circle';
          circle.style.backgroundColor = colorHex;
          circle.dataset.color = colorHex;
          if(index===0) circle.classList.add('selected');
          circle.addEventListener('click', () => {
            document.querySelectorAll('.color-circle').forEach(c=>c.classList.remove('selected'));
            circle.classList.add('selected');
            console.log('Color seleccionado:', colorHex);
          });
          colorsContainer.appendChild(circle);
        }
      });
    }
  } catch(e){
    console.warn("No se pudo decodificar base64:", e);
  }

  // Comprimir URL
  const compressedScene = LZString.compressToEncodedURIComponent(rawUrl);
  const shortUrl = `${window.location.origin}${window.location.pathname}?scene=${compressedScene}`;
  document.getElementById('short-url').innerHTML = `Link del producto: <a href="${shortUrl}" target="_blank">${shortUrl}</a>`;

  // Guardar diseño en PDF estilo tarjeta
  const saveBtn = document.getElementById('save-button');
  saveBtn.addEventListener('click', async () => {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'pt', [350,200]); // tamaño tarjeta

    // Fondo
    pdf.setFillColor(245,245,245);
    pdf.rect(0,0,350,200,'F');

    // Título
    pdf.setFontSize(18);
    pdf.setTextColor(0,0,0);
    pdf.text(productName, 20, 40);

    // Autor
    pdf.setFontSize(12);
    pdf.setTextColor(80,80,80);
    pdf.text('Autor: ' + productAuthor, 20, 60);

    // QR
    const qrCanvas = document.createElement('canvas');
    await QRCode.toCanvas(qrCanvas, shortUrl, { width: 80 });
    pdf.addImage(qrCanvas.toDataURL('image/png'), 250, 20, 80, 80);

    // Link clicable
    pdf.setFontSize(10);
    pdf.setTextColor(0,0,255);
    pdf.textWithLink(shortUrl, 20, 90, { url: shortUrl });

    pdf.save('tarjeta-producto.pdf');
  });

})();
</script>

</body>
</html>
