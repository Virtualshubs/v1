<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Producto 3D</title>
  <script src="https://cdn.3dtwins.tech/sdk.js"></script> <!-- SDK -->
</head>
<body>
  <div id="product-info" style="width:25%; float:left; padding:10px;">
    <h1 id="product-name"></h1>
    <p id="product-author"></p>
    <p id="product-config"></p>
    <input type="number" id="productQuantity" value="1" min="1">
    <button id="buy-button">Comprar</button>
  </div>

  <div id="vh-container" style="width:70%; height:100vh; float:right;"></div>

  <script>
    (function(){
      // Leer parámetro scene de la URL
      const urlParams = new URLSearchParams(window.location.search);
      let base64Scene = '';
      if(urlParams.has('scene')) {
        base64Scene = urlParams.get('scene');
      }

      if(!base64Scene) {
        console.error("No se ha proporcionado escena en la URL");
        return;
      }

      // Inicializar SDK igual que en scene.3dtwins.tech
      VH.init({
        containerId: 'vh-container',
        scene: base64Scene
      });

      // Reemplazar URL para que quede limpia
      history.replaceState({}, '', `?scene=${base64Scene}`);

      // Opcional: decodificar base64 para rellenar info de producto
      try {
        const decoded = atob(base64Scene);
        const params = new URLSearchParams(decoded.split('?')[1]);
        document.getElementById('product-name').innerText = params.get('name') || '';
        document.getElementById('product-author').innerText = params.get('author') || '';
        document.getElementById('product-config').innerText = params.get('config') || '';
      } catch(e){
        console.warn("No se pudo decodificar base64:", e);
      }
    })();
  </script>
</body>
</html>
