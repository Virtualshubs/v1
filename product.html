<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Producto 3D - 3D Twins</title>
<script src="https://cdn.3dtwins.tech/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
  body {
    margin: 0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background-color: #fff;
    color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .product-page {
    display: flex;
    max-width: 1200px;
    width: 100%;
    height: 80vh;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
  }
  #vh-container {
    flex: 1;
    background-color: #f2f2f2;
    margin: 20px;
    border-radius: 8px;
    position: relative;
  }
  .product-info {
    flex: 1;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 20px;
    background-color: #fff;
  }
  .product-info h1 {
    font-size: 2em;
    margin: 0;
  }
  .product-info p {
    font-size: 1em;
    color: #555;
    margin: 0;
  }
  .colors-container {
    display: flex;
    gap: 10px;
    margin: 10px 0;
  }
  .color-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid #ccc;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .color-circle.selected {
    border: 2px solid #111;
  }
  .buy-button, .save-button {
    margin-top: 15px;
    padding: 12px;
    font-size: 1em;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 6px;
  }
  .buy-button {
    background-color: #111;
    color: #fff;
  }
  .buy-button:hover {
    background-color: #333;
  }
  .save-button {
    background-color: #fff;
    color: #111;
    border: 1px solid #111;
  }
  .save-button:hover {
    background-color: #f0f0f0;
  }
  label {
    font-weight: bold;
  }
  input[type="number"] {
    width: 60px;
    padding: 4px 8px;
    font-size: 1em;
  }
</style>
</head>
<body>

<div class="product-page">
  <div id="vh-container"></div>

  <div class="product-info">
    <h1 id="product-name">Nombre del producto</h1>
    <p id="product-author">Autor: </p>

    <div id="colors" class="colors-container"></div>

    <label for="productQuantity">Cantidad:</label>
    <input type="number" id="productQuantity" value="1" min="1">

    <button class="buy-button" id="buy-button">Comprar</button>
    <button class="save-button" id="save-button">Guardar diseño (PDF)</button>
  </div>
</div>

<script>
(async function(){
  const urlParams = new URLSearchParams(window.location.search);
  let base64Scene = '';
  if(urlParams.has('scene')) base64Scene = urlParams.get('scene');
  if(!base64Scene) {
    console.error("No se ha proporcionado escena en la URL");
    return;
  }

  // Inicializar SDK
  VH.init({
    containerId: 'vh-container',
    scene: base64Scene
  });

  history.replaceState({}, '', `?scene=${base64Scene}`);

  // Extraer info del producto y colores
  const colorsContainer = document.getElementById('colors');
  try {
    const decoded = atob(base64Scene);
    const params = new URLSearchParams(decoded.split('?')[1]);
    document.getElementById('product-name').innerText = params.get('name') || '';
    document.getElementById('product-author').innerText = 'Autor: ' + (params.get('author') || 'Desconocido');

    const config = params.get('config') || '';
    if(config){
      config.split('|').forEach((item,index)=>{
        const [objName, colorHex] = item.split(':');
        if(colorHex){
          const circle = document.createElement('span');
          circle.className = 'color-circle';
          circle.style.backgroundColor = colorHex;
          circle.dataset.color = colorHex;
          if(index===0) circle.classList.add('selected');
          circle.addEventListener('click', () => {
            document.querySelectorAll('.color-circle').forEach(c=>c.classList.remove('selected'));
            circle.classList.add('selected');
            // Actualizar color en modelo 3D dinámicamente si se desea
            console.log('Color seleccionado:', colorHex);
          });
          colorsContainer.appendChild(circle);
        }
      });
    }
  } catch(e){
    console.warn("No se pudo decodificar base64:", e);
  }

saveBtn.addEventListener('click', async () => {
  const { jsPDF } = window.jspdf;

  // Capturamos directamente el canvas WebGL del visor
  const canvas3D = document.querySelector('#vh-container canvas');
  if(!canvas3D) return alert("No se ha encontrado el canvas 3D");
  const img3D = canvas3D.toDataURL('image/png');

  // Generar QR de la URL de producto
  const qrCanvas = document.createElement('canvas');
  await QRCode.toCanvas(qrCanvas, window.location.href, { width: 128 });
  const qrData = qrCanvas.toDataURL('image/png');

  // Crear PDF
  const pdf = new jsPDF('p', 'pt', 'a4');
  const pdfWidth = pdf.internal.pageSize.getWidth();
  const pdfHeight = pdf.internal.pageSize.getHeight();
  const margin = 40;

  pdf.addImage(img3D, 'PNG', margin, margin, pdfWidth - margin*2, pdfHeight - 200);
  pdf.addImage(qrData, pdfWidth - 150, pdfHeight - 150, 128, 128);

  pdf.setFontSize(12);
  pdf.text(`Producto: ${document.getElementById('product-name').innerText}`, margin, pdfHeight - 170);
  pdf.text(`Autor: ${document.getElementById('product-author').innerText}`, margin, pdfHeight - 150);

  pdf.save('diseño-producto.pdf');
});

})();
</script>

</body>
</html>
