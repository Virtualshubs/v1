<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Producto 3DTwins</title>
<style>
  body { display:flex; margin:0; font-family:sans-serif; }
  .left-panel { width:30%; padding:20px; background:#f5f5f5; }
  .right-panel { width:70%; height:100vh; }
  #vh-container { width:100%; height:100%; }
</style>
</head>
<body>

<div class="left-panel">
  <h1 id="product-name">Producto</h1>
  <p id="product-author">Autor: --</p>
  <div>
    <label>Cantidad: <input type="number" value="1" id="productQuantity"></label>
  </div>
  <button id="buy-btn">Comprar</button>
</div>

<div class="right-panel">
  <div id="vh-container"></div>
</div>

<script src="sdk.js"></script>
<script>
(function(){
  const urlParams = new URLSearchParams(window.location.search);
  const sceneBase64 = urlParams.get('scene');
  if(!sceneBase64) {
    console.error("No se ha proporcionado escena en la URL");
    return;
  }

  // Inicializa el SDK con la escena
  VH.init({
    containerId: 'vh-container',
    scene: sceneBase64
  });

  // Parsear el rawUrl dentro del base64 para obtener parámetros de producto
  const decoded = atob(sceneBase64);
  const params = new URLSearchParams(decoded.split('?')[1]); // extrae los parámetros originales

  document.getElementById('product-name').innerText = params.get('name') || 'Producto';
  document.getElementById('product-author').innerText = "Autor: " + (params.get('author') || '--');

})();
</script>

</body>
</html>
