<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>3D product twin page</title>
<script src="https://cdn.3dtwins.tech/sdk.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
  body {
    margin: 0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background-color: #f7f7f7;
    color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .product-page {
    display: flex;
    max-width: 1200px;
    width: 100%;
    height: 80vh;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    background-color: #fff;
  }
  #vh-container {
    flex: 1;
    background-color: #eaeaea;
    margin: 20px;
    border-radius: 8px;
    position: relative;
  }
  .product-info {
    flex: 1;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 20px;
    background-color: #fff;
  }
  .product-info h1 {
    font-size: 2em;
    margin: 0;
  }
  .product-info p {
    font-size: 1em;
    color: #555;
    margin: 0;
  }
  .colors-container {
    display: flex;
    gap: 10px;
    margin: 10px 0;
  }
  .color-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid #ccc;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .color-circle.selected {
    border: 2px solid #111;
  }
  .buy-button, .save-button {
    margin-top: 15px;
    padding: 12px;
    font-size: 1em;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 6px;
  }
  .buy-button {
    background-color: #111;
    color: #fff;
  }
  .buy-button:hover {
    background-color: #333;
  }
  .save-button {
    background-color: #fff;
    color: #111;
    border: 1px solid #111;
  }
  .save-button:hover {
    background-color: #f0f0f0;
  }
  label {
    font-weight: bold;
  }
  input[type="number"] {
    width: 60px;
    padding: 4px 8px;
    font-size: 1em;
  }
</style>
</head>
<body>

<div class="product-page">
  <div id="vh-container"></div>

  <div class="product-info">
    <h1 id="product-name">Nombre del producto</h1>
    <p id="product-author">Autor: </p>

    <div id="colors" class="colors-container"></div>

    <label for="productQuantity">Cantidad:</label>
    <input type="number" id="productQuantity" value="1" min="1">

    <button class="buy-button" id="buy-button">Comprar</button>
    <button class="save-button" id="save-button">Guardar diseño (PDF)</button>
  </div>
</div>
  
  <script src="https://cdn.3dtwins.tech/product.js" defer></script>

</body>
</html>
