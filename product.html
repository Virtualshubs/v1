<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>3D product twin page</title>
<script src="https://cdn.3dtwins.tech/sdk.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
  body {
    margin: 0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background-color: #f7f7f7;
    color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .product-page {
    display: flex;
    max-width: 1200px;
    width: 100%;
    height: 80vh;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    background-color: #fff;
  }
  #vh-container {
    flex: 1;
    background-color: #eaeaea;
    margin: 20px;
    border-radius: 8px;
    position: relative;
  }
  .product-info {
    flex: 1;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 20px;
    background-color: #fff;
  }
  .product-info h1 {
    font-size: 2em;
    margin: 0;
  }
  .product-info p {
    font-size: 1em;
    color: #555;
    margin: 0;
  }
  .colors-container {
    display: flex;
    gap: 10px;
    margin: 10px 0;
  }
  .color-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid #ccc;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .color-circle.selected {
    border: 2px solid #111;
  }
  .buy-button, .save-button {
    margin-top: 15px;
    padding: 12px;
    font-size: 1em;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 6px;
  }
  .buy-button {
    background-color: #111;
    color: #fff;
  }
  .buy-button:hover {
    background-color: #333;
  }
  .save-button {
    background-color: #fff;
    color: #111;
    border: 1px solid #111;
  }
  .save-button:hover {
    background-color: #f0f0f0;
  }
  label {
    font-weight: bold;
  }
  input[type="number"] {
    width: 60px;
    padding: 4px 8px;
    font-size: 1em;
  }
</style>
</head>
<body>

<div class="product-page">
  <div id="vh-container"></div>

  <div class="product-info">
    <h1 id="product-name">Nombre del producto</h1>
    <p id="product-author">Autor: </p>

    <div id="colors" class="colors-container"></div>

    <label for="productQuantity">Cantidad:</label>
    <input type="number" id="productQuantity" value="1" min="1">

    <button class="buy-button" id="buy-button">Comprar</button>
    <button class="save-button" id="save-button">Guardar diseño (PDF)</button>
  </div>
</div>

<script>
(async function(){
  const urlParams = new URLSearchParams(window.location.search);
  let base64Scene = '';
  if(urlParams.has('scene')) base64Scene = urlParams.get('scene');
  if(!base64Scene) {
    console.error("No se ha proporcionado escena en la URL");
    return;
  }

  VH.init({
    containerId: 'vh-container',
    scene: base64Scene
  });

  history.replaceState({}, '', `?scene=${base64Scene}`);

  const colorsContainer = document.getElementById('colors');
  let productName = '';
  let productAuthor = '';
  try {
    const decoded = atob(base64Scene);
    const params = new URLSearchParams(decoded.split('?')[1]);
    productName = params.get('name') || '';
    productAuthor = params.get('author') || 'Desconocido';
    document.getElementById('product-name').innerText = productName;
    document.getElementById('product-author').innerText = 'Autor: ' + productAuthor;

    const config = params.get('config') || '';
    if(config){
      config.split('|').forEach((item,index)=>{
        const [objName, colorHex] = item.split(':');
        if(colorHex){
          const circle = document.createElement('span');
          circle.className = 'color-circle';
          circle.style.backgroundColor = colorHex;
          circle.dataset.color = colorHex;
          if(index===0) circle.classList.add('selected');
          circle.addEventListener('click', () => {
            document.querySelectorAll('.color-circle').forEach(c=>c.classList.remove('selected'));
            circle.classList.add('selected');
            console.log('Color seleccionado:', colorHex);
          });
          colorsContainer.appendChild(circle);
        }
      });
    }
  } catch(e){
    console.warn("No se pudo decodificar base64:", e);
  }

  const saveBtn = document.getElementById('save-button');
  saveBtn.addEventListener('click', async () => {
    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF('p', 'pt', 'a4');
    const pageWidth = pdf.internal.pageSize.getWidth();
    const margin = 40;

    pdf.setFillColor(245, 245, 245);
    pdf.roundedRect(margin, 50, pageWidth - 2*margin, 260, 10, 10, 'F');

    pdf.setFontSize(14);
    pdf.setTextColor(0,0,0);
    pdf.text(`Producto: ${productName}`, margin + 20, 80);
    pdf.setFontSize(12);
    pdf.text(`Autor: ${productAuthor}`, margin + 20, 110);

    const colorXStart = margin + 20;
    const colorY = 130;
    const colorSize = 12;
    const selectedColors = Array.from(document.querySelectorAll('.color-circle')).map(c => c.dataset.color);
    selectedColors.forEach((c, i) => {
      pdf.setFillColor(...hexToRgb(c));
      pdf.rect(colorXStart + i*(colorSize+5), colorY, colorSize, colorSize, 'F');
    });

    const qrCanvas = document.createElement('canvas');
    await QRCode.toCanvas(qrCanvas, window.location.href, { width: 128 });
    const qrX = pageWidth - margin - 128 - 10; 
    const qrY = 60; 
    pdf.addImage(qrCanvas.toDataURL('image/png'), qrX, qrY, 128, 128);

    pdf.setTextColor(0,0,255);
    pdf.setFontSize(10);
    const urlMaxWidth = pageWidth - 2*margin - 20;
    const urlLines = pdf.splitTextToSize(window.location.href, urlMaxWidth);

    let yPos = qrY + 128 + 10;
    urlLines.forEach(line => {
      pdf.textWithLink(line, margin + 20, yPos, { url: window.location.href });
      yPos += 12;
    });

    pdf.save('producto-personalizado-3dtwins.pdf');
  });

  function hexToRgb(hex) {
    hex = hex.replace('#','');
    const bigint = parseInt(hex,16);
    const r = (bigint >> 16) & 255;
    const g = (bigint >> 8) & 255;
    const b = bigint & 255;
    return [r,g,b];
  }

})();
</script>

</body>
</html>
